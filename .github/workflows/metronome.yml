name: metronome

on:
  push:
    branches:
      - main

jobs:
  uv-one:
    name: python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
  
      - name: "Set up python with github actions"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
          
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
  
      #Python set up complete, install project now
      - name: Install TogePy project
        run: uv sync --locked --all-extras --dev
        
      - name: test everything
        run: uv run pytest

      - name: test everything with coverage and on steroids
        run: uv run pytest --cov -n auto

      - name: run ruff linter and autofix soft problems
        run: uv run ruff --check --fix
      

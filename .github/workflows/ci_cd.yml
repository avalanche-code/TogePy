name: React CI/CD Pipeline

on:
  push:
    branches: [reactFrontend]
  pull_request:
    branches: [reactFrontend]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:

  lint:
    name: Linting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./togepy/react/togePy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ./togepy/react/togePy/package-lock.json

      - run: npm ci
      - run: npm run lint


  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./togepy/react/togePy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ./togepy/react/togePy/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./togepy/react/togePy/dist/


  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs:
      - lint
      - build

    defaults:
      run:
        working-directory: ./togepy/react/togePy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ./togepy/react/togePy/package-lock.json

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test --project=chromium


  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest

    needs:
      - test

    environment:
      name: github-pages

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        uses: actions/deploy-pages@v4
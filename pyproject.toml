[project]
name = "togepy"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.12",
]

#Custom Ruff Settings
[tool.ruff]
#Enable preview rules for linting
preview = true
#"PL" for pylint
#"N" for pep8-naming
#"E" for pycodestyle, beide machen Line too long oder "not enough blanks"
[tool.ruff.lint]
select = ["F", "I", "B", "UP", "PL"]


